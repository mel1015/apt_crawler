name: 청약 알리미 일일 실행

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 KST 09:00 (UTC 00:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Java 25 설정
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 빌드
        run: ./gradlew bootJar -x test

      - name: 실행
        env:
          APT_API_KEY: ${{ secrets.APT_API_KEY }}
          APT_REGIONS: ${{ secrets.APT_REGIONS }}
          APT_TOP_N: ${{ vars.APT_TOP_N }}
          APT_MAX_PRICE: ${{ vars.APT_MAX_PRICE }}
          USER_RESIDENT_REGION: ${{ secrets.USER_RESIDENT_REGION }}
          USER_IS_NEWLYWED: ${{ vars.USER_IS_NEWLYWED }}
          USER_IS_FIRST_TIME_BUYER: ${{ vars.USER_IS_FIRST_TIME_BUYER }}
          USER_MONTHLY_INCOME: ${{ vars.USER_MONTHLY_INCOME }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: java -jar build/libs/apt_crawler-*.jar
